# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

fail_fast = true

[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-toml" },
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "cargo-fmt",
    name = "cargo fmt",
    entry = "cargo fmt --all -- --check",
    language = "system",
    types = ["rust"],
    pass_filenames = false,
    priority = 0,
  },
  {
    id = "cargo-clippy",
    name = "cargo clippy",
    # macOS では Apple Container 上の Linux コンテナで Rosetta 2 を使わず x86_64 ターゲットの clippy を実行する
    # 事前に `make container-build` でイメージ (amf-rs-check) を用意しておくこと
    # ソースは bind mount するので Rust ファイルの編集はコンテナ再ビルドなしで反映される
    # ホストの target/ と衝突しないようコンテナ内では CARGO_TARGET_DIR=/tmp/cargo-target を使う
    entry = "sh -c 'case \"$(uname -s)\" in Darwin) container run --rm -v \"$(pwd):/workspace\" -w /workspace -e CARGO_TARGET_DIR=/tmp/cargo-target amf-rs-check cargo clippy --workspace --all-targets -- -D warnings;; *) cargo clippy --workspace --all-targets -- -D warnings;; esac'",
    language = "system",
    types = ["rust"],
    pass_filenames = false,
    priority = 10,
  },
  {
    id = "cargo-test",
    name = "cargo test",
    entry = "bash -c 'if [ \"$(uname)\" = \"Linux\" ]; then cargo test --workspace; fi'",
    language = "system",
    types = ["rust"],
    pass_filenames = false,
    priority = 20,
  },
]
